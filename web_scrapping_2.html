  <script type="text/javascript">
    $(function(){
        //mengambil data dari file json
        $.get('/web_scrapping_2/source/hasil_scrap.json',function(obj){
            var str = "<table class=content-table>";
            str +="<thead>"
            str +="<tr><td>Cover</td><td>Judul</td><td>Origin</td><td>Rating</td><td>Waktu Scrapping</td></tr>";
            str +="</thead>"
            str += "<tbody>"
            $.each(obj,function(n,data){
                str +="<td class=image-cover>" +"<img src=" + data.img_src + ">" + "</td>";
                str +="<td>#" + (n+1) + " " + data.Judul + "</td>";
                str +="<td style='text-align:center'>" + data.origin + "</td>";
                str +="<td style='text-align:center'>" + data.rating + "</td>";
                str +="<td style='text-align:center'>" + data.Waktu_scrapping + "</td></tr>";
            });
            str += "</tbody>"
            str +="</table>";
            $('#top100list').html(str);
        });
    });
</script>
